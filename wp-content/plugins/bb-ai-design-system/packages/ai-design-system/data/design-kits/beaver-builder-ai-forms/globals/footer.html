<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Footer</title>
  <link rel="stylesheet" href="../design-system/styles.css">
  <script src="../design-system/script.js"></script>
  <style>
    /* @section Site Footer */
    .site-footer {
      background: var(--ds-color-teal-deep);
      padding: 36px 0;
      text-align: center;
    }

    .site-footer__inner {
      width: 100%;
      max-width: var(--ds-width-wide);
      margin: 0 auto;
      padding: 0 var(--ds-space-px);
    }

    .site-footer__logo {
      font-family: var(--ds-font-display);
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
    }
    .site-footer__logo-accent { color: var(--ds-color-amber-dark); }

    .site-footer__copy {
      font-family: var(--ds-font-mono);
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: var(--ds-letter-wide);
    }

    .site-footer__links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .site-footer__link {
      font-family: var(--ds-font-mono);
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: var(--ds-letter-wider);
      transition: color var(--ds-transition-base);
    }
    .site-footer__link:hover { color: var(--ds-color-amber-dark); }
  </style>
</head>
<body>

  <footer id="site-footer" class="site-footer" data-label="Site Footer">
    <div class="site-footer__inner">
      <div class="site-footer__logo">
        <span data-field="logo_name">Beaver Builder</span> <span class="site-footer__logo-accent" data-field="logo_accent">AI</span>
      </div>
      <div class="site-footer__links" data-repeater="links">
        <a class="site-footer__link" href="#" data-repeater-item data-field="label" data-field-href="url">Privacy</a>
        <a class="site-footer__link" href="#" data-repeater-item data-field="label" data-field-href="url">Terms</a>
        <a class="site-footer__link" href="#" data-repeater-item data-field="label" data-field-href="url">Contact</a>
      </div>
      <p class="site-footer__copy" data-field="copy">&copy; 2026 Beaver Builder. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
