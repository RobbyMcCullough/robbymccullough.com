<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="post-type" content="page">
  <title>Contact — Beaver Builder AI Forms</title>
  <link rel="stylesheet" href="../design-system/styles.css">
  <script src="../design-system/script.js"></script>
  <style>
    /* @page */
    main { position: relative; z-index: 1; }

    /* @section Contact */
    .contact {
      padding: 80px 0 100px;
      position: relative;
      overflow: hidden;
    }
    .contact::before {
      content: '';
      position: absolute;
      top: 40px;
      right: -80px;
      width: 260px;
      height: 200px;
      background: var(--ds-color-amber);
      opacity: 0.07;
      border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
      transform: rotate(25deg);
      z-index: 0;
      pointer-events: none;
    }
    .contact::after {
      content: '';
      position: absolute;
      bottom: 60px;
      left: -60px;
      width: 200px;
      height: 160px;
      background: var(--ds-color-teal);
      opacity: 0.04;
      border-radius: 45% 55% 50% 50% / 60% 40% 60% 40%;
      transform: rotate(-15deg);
      z-index: 0;
      pointer-events: none;
    }

    .contact__inner {
      max-width: 560px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .contact__header {
      text-align: center;
      margin-bottom: 44px;
    }

    .contact__eyebrow {
      margin-bottom: 22px;
      display: inline-block;
    }

    .contact__title {
      font-size: var(--ds-text-4xl);
      color: var(--ds-color-teal);
      margin-bottom: 16px;
      transform: rotate(-0.4deg);
      line-height: var(--ds-line-tight);
    }

    .contact__subtitle {
      font-size: var(--ds-text-lg);
      color: var(--ds-color-text-light);
      line-height: var(--ds-line-loose);
      max-width: 440px;
      margin: 0 auto;
    }

    /* Form card wrapper — lets the tape strip sit outside the clip-path */
    .contact__card-wrap {
      position: relative;
      transform: rotate(0.3deg);
    }

    .contact__card-tape {
      position: absolute;
      top: -12px;
      left: 38%;
      width: 96px;
      height: 24px;
      background: var(--ds-color-amber-light);
      opacity: 0.6;
      transform: rotate(-2deg);
      z-index: 2;
      pointer-events: none;
      clip-path: polygon(
        0% 4%, 10% 0%, 30% 5%, 55% 0%, 75% 4%, 92% 0%, 100% 3%,
        100% 96%, 88% 100%, 65% 95%, 40% 100%, 15% 96%, 0% 100%
      );
    }

    .contact__card {
      background: var(--ds-color-white);
      padding: 40px 36px 32px;
      position: relative;
      box-shadow: var(--ds-shadow-card-lg);
      clip-path: polygon(
        0% 1%, 6% 0%, 14% 0.8%, 28% 0%, 42% 1%, 58% 0%, 72% 0.8%, 86% 0%, 94% 1%, 100% 0%,
        100% 99%, 94% 100%, 82% 99.2%, 68% 100%, 54% 99%, 40% 100%, 26% 99.2%, 12% 100%, 0% 99%
      );
    }

    .contact__form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact__field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .contact__label {
      font-family: var(--ds-font-body);
      font-size: var(--ds-text-sm);
      font-weight: var(--ds-weight-semibold);
      color: var(--ds-color-text);
    }

    .contact__input,
    .contact__textarea {
      border: 2px solid var(--ds-color-cream-mid);
      background: var(--ds-color-white);
      color: var(--ds-color-text);
      font-family: var(--ds-font-body);
      font-size: var(--ds-text-base);
      padding: 12px 16px;
      outline: none;
      transition: border-color var(--ds-transition-base);
      clip-path: polygon(
        0% 2%, 8% 0%, 22% 1.5%, 40% 0%, 60% 1%, 80% 0%, 100% 0.8%,
        100% 98%, 85% 100%, 65% 98.5%, 45% 100%, 25% 99%, 8% 100%, 0% 99%
      );
    }
    .contact__input::placeholder,
    .contact__textarea::placeholder {
      color: #aaa;
    }
    .contact__input:focus,
    .contact__textarea:focus {
      border-color: var(--ds-color-teal);
    }

    .contact__textarea {
      resize: vertical;
      min-height: 140px;
      line-height: var(--ds-line-base);
    }

    /* Consent row — checkbox + small copy */
    .contact__consent {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 4px;
    }

    .contact__consent-box {
      flex-shrink: 0;
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid var(--ds-color-cream-mid);
      background: var(--ds-color-white);
      cursor: pointer;
      margin-top: 2px;
      transition: border-color var(--ds-transition-base), background var(--ds-transition-base);
      position: relative;
    }
    .contact__consent-box:checked {
      background: var(--ds-color-teal);
      border-color: var(--ds-color-teal);
    }
    .contact__consent-box:checked::after {
      content: '';
      position: absolute;
      top: 1px;
      left: 4px;
      width: 5px;
      height: 9px;
      border: solid var(--ds-color-white);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .contact__consent-text {
      font-family: var(--ds-font-mono);
      font-size: 0.78rem;
      color: var(--ds-color-text-light);
      line-height: 1.5;
    }
    .contact__consent-text a { color: var(--ds-color-teal); border-bottom: 1px dotted currentColor; }

    .contact__submit {
      width: 100%;
      margin-top: 6px;
    }

    /* Error notice — torn-edge sienna card */
    .contact__error {
      border: none;
      border-left: 4px solid var(--ds-color-sienna);
      background: var(--ds-color-white);
      color: var(--ds-color-sienna);
      font-family: var(--ds-font-mono);
      font-size: 0.85rem;
      padding: 12px 16px;
      box-shadow: 3px 4px 12px rgba(0, 0, 0, 0.04);
      transform: rotate(0.3deg);
      clip-path: polygon(
        0% 0%, 100% 0.3%, 100% 99.7%, 92% 100%, 78% 99.6%, 60% 100%, 40% 99.7%, 22% 100%, 8% 99.6%, 0% 100%
      );
    }

    /* Success panel — replaces the form */
    .contact__success {
      text-align: center;
      padding: 16px 12px 8px;
    }
    .contact__success-mark {
      width: 56px;
      height: 56px;
      margin: 0 auto 18px;
      background: var(--ds-color-amber);
      border-radius: var(--ds-radius-round);
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(-2deg);
    }
    .contact__success-mark svg {
      width: 28px;
      height: 28px;
      stroke: var(--ds-color-teal);
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .contact__success-heading {
      font-size: var(--ds-text-2xl);
      color: var(--ds-color-teal);
      margin-bottom: 10px;
      transform: rotate(-0.4deg);
    }
    .contact__success-body {
      color: var(--ds-color-text-light);
      font-size: 1rem;
      line-height: var(--ds-line-base);
      max-width: 360px;
      margin: 0 auto;
    }

    @media (max-width: 600px) {
      .contact { padding: 50px 0 80px; }
      .contact__card { padding: 30px 22px 24px; }
      .contact__title { font-size: 2rem; }
    }
  </style>
  <script>
    /* @section Contact */
    onReady(() => {
      const section = document.querySelector('.contact');
      if (!section) return;
      const form = section.querySelector('#contact-form');
      const cardWrap = section.querySelector('.contact__card-wrap');
      const success = section.querySelector('.contact__success-wrap');
      if (!form || !success) return;

      form.addEventListener('fl:form:success', () => {
        cardWrap.hidden = true;
        success.hidden = false;
        success.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    });
  </script>
</head>
<body>

  <section id="contact" class="contact" data-label="Contact">
    <div class="bb-container">
      <div class="contact__inner">
        <header class="contact__header bb-reveal">
          <span class="contact__eyebrow bb-badge" data-field="eyebrow">Form 01 — Contact</span>
          <h1 class="contact__title" data-field="title">Say hello.</h1>
          <p class="contact__subtitle" data-field="subtitle">The classic form — name, email, message. Short, unhurried, honest.</p>
        </header>

        <div class="contact__card-wrap bb-reveal bb-reveal--delay-1">
          <div class="contact__card-tape" aria-hidden="true"></div>
          <div class="contact__card">
            <form id="contact-form" class="contact__form" novalidate>
              <div class="contact__field">
                <label class="contact__label" for="contact-name">Name</label>
                <input class="contact__input" type="text" id="contact-name" name="name" autocomplete="name" required>
              </div>

              <div class="contact__field">
                <label class="contact__label" for="contact-email">Email</label>
                <input class="contact__input" type="email" id="contact-email" name="email" autocomplete="email" required>
              </div>

              <div class="contact__field">
                <label class="contact__label" for="contact-message">Message</label>
                <textarea class="contact__textarea" id="contact-message" name="message" rows="5" required></textarea>
              </div>

              <label class="contact__consent">
                <input class="contact__consent-box" type="checkbox" name="consent" required>
                <span class="contact__consent-text" data-field="consent_text">I'm okay with you holding onto this message so you can reply. See the <a href="#" data-field-href="privacy_url">privacy notes</a>.</span>
              </label>

              <p class="contact__error" role="alert" hidden data-field="error_message">Something went sideways. Try again in a moment.</p>

              <button class="bb-btn bb-btn--amber contact__submit" type="submit" data-field="submit_label">Send message</button>
            </form>
          </div>
        </div>

        <div class="contact__success-wrap" hidden>
          <div class="contact__card-wrap">
            <div class="contact__card-tape" aria-hidden="true"></div>
            <div class="contact__card">
              <div class="contact__success">
                <div class="contact__success-mark" aria-hidden="true">
                  <svg viewBox="0 0 24 24"><path d="M5 12l4 4 10-10"/></svg>
                </div>
                <h2 class="contact__success-heading" data-field="success_heading">Got it. Thank you.</h2>
                <p class="contact__success-body" data-field="success_body">Your message is in. Expect a human reply within a day or two.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
