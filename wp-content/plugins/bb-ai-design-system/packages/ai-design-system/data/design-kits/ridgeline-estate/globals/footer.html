<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ridgeline Estate — Site Footer</title>
  <meta name="post-type" content="page">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/styles.css">
  <style>
    /* @section Footer */
    .site-footer {
      background: var(--ds-color-navy);
      border-top: 1px solid var(--ds-color-white-10);
      padding: var(--ds-space-xl) 0 var(--ds-space-lg);
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1fr;
      gap: var(--ds-space-xl);
      margin-bottom: var(--ds-space-xl);
    }
    .footer-brand-name {
      font-family: var(--ds-font-heading);
      font-size: var(--ds-text-2xl);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--ds-color-white);
      display: block;
      margin-bottom: 0.2rem;
    }
    .footer-brand-sub {
      font-family: var(--ds-font-body);
      font-size: 0.62rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ds-color-gold);
      margin-bottom: var(--ds-space-md);
      display: block;
    }
    .footer-brand-tagline { font-size: var(--ds-text-sm); color: var(--ds-color-white-50); line-height: 1.75; }
    .footer-col h5 {
      font-family: var(--ds-font-body);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ds-color-gold);
      padding-bottom: var(--ds-space-sm);
      border-bottom: 1px solid var(--ds-color-white-10);
      margin-bottom: var(--ds-space-md);
    }
    .footer-links { display: flex; flex-direction: column; gap: var(--ds-space-sm); }
    .footer-links a {
      font-size: var(--ds-text-sm);
      color: var(--ds-color-white-50);
      transition: color var(--ds-transition-base);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .footer-links a::before {
      content: '';
      width: 12px;
      height: 1px;
      background: rgba(201,168,76,0.35);
      flex-shrink: 0;
      transition: width var(--ds-transition-base), background var(--ds-transition-base);
    }
    .footer-links a:hover { color: var(--ds-color-gold); }
    .footer-links a:hover::before { width: 20px; background: var(--ds-color-gold); }
    .footer-base {
      border-top: 1px solid var(--ds-color-white-10);
      padding-top: var(--ds-space-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-copy { font-size: var(--ds-text-sm); color: var(--ds-color-white-50); }
    @media (max-width: 768px) {
      .footer-grid { grid-template-columns: 1fr; }
      .footer-base { flex-direction: column; gap: var(--ds-space-sm); }
    }
  </style>
</head>
<body>
<footer data-label="Footer" id="site-footer" class="site-footer">
  <div class="bb-container">
    <div class="footer-grid">
      <div>
        <span class="footer-brand-name" data-field="footer_brand_name">Ridgeline Estate Winery</span>
        <span class="footer-brand-sub" data-field="footer_brand_sub">Napa Valley · Est. 1978</span>
        <p class="footer-brand-tagline" data-field="footer_tagline">Estate-grown wines made with care and without shortcuts. Come visit us in St. Helena.</p>
      </div>
      <div class="footer-col">
        <h5 data-field="footer_col1_heading">Explore</h5>
        <div data-repeater="footer_links_1" class="footer-links">
          <a data-repeater-item data-field-href="url" href="#" data-field="label">Our Story</a>
          <a data-repeater-item data-field-href="url" href="#" data-field="label">Tasting Room</a>
          <a data-repeater-item data-field-href="url" href="#" data-field="label">Wine Club</a>
          <a data-repeater-item data-field-href="url" href="#" data-field="label">Shop Wines</a>
        </div>
      </div>
      <div class="footer-col">
        <h5 data-field="footer_col2_heading">Visit</h5>
        <div data-repeater="footer_links_2" class="footer-links">
          <a data-repeater-item data-field-href="url" href="#" data-field="label">Book a Tasting</a>
          <a data-repeater-item data-field-href="url" href="#" data-field="label">Private Events</a>
          <a data-repeater-item data-field-href="url" href="#" data-field="label">Directions</a>
          <a data-repeater-item data-field-href="url" href="#" data-field="label">Contact Us</a>
        </div>
      </div>
    </div>
    <div class="footer-base">
      <span class="footer-copy" data-field="footer_copyright">© 2026 Ridgeline Estate Winery. All rights reserved.</span>
    </div>
  </div>
</footer>
</body>
</html>
