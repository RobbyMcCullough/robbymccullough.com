<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Timberline — Site Header</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/styles.css">
  <script src="../design-system/script.js"></script>
  <style>
    /* @section Header */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(250,250,247,0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 1px 0 var(--ds-color-border);
      transition: background var(--ds-transition-base), box-shadow var(--ds-transition-base);
    }
    .site-header .bb-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
    }
    .site-header .header-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .site-header .header-logo-icon {
      width: 26px;
      height: 26px;
      color: var(--ds-color-primary);
      flex-shrink: 0;
      transition: color var(--ds-transition-fast);
    }
    .site-header .header-logo-text {
      font-family: var(--ds-font-heading);
      font-size: var(--ds-text-lg);
      font-weight: var(--ds-weight-regular);
      letter-spacing: 0.06em;
      color: var(--ds-color-primary-dark);
      transition: color var(--ds-transition-fast);
    }
    .site-header .header-nav {
      display: flex;
      align-items: center;
      gap: var(--ds-space-lg);
    }
    .site-header .header-nav a {
      font-size: var(--ds-text-sm);
      font-weight: var(--ds-weight-medium);
      letter-spacing: 0.04em;
      color: var(--ds-color-text-muted);
      transition: color var(--ds-transition-fast);
    }
    .site-header .header-nav a:hover {
      color: var(--ds-color-primary);
    }
    .site-header .header-cta {
      display: inline-block;
      background: var(--ds-color-secondary);
      color: var(--ds-color-white);
      border: 1.5px solid var(--ds-color-secondary);
      border-radius: var(--ds-radius-sm);
      padding: 0.55rem 1.4rem;
      font-family: var(--ds-font-body);
      font-size: var(--ds-text-sm);
      font-weight: var(--ds-weight-medium);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background var(--ds-transition-fast), border-color var(--ds-transition-fast);
    }
    .site-header .header-cta:hover {
      background: #9a5822;
      border-color: #9a5822;
    }
    @media (max-width: 768px) {
      .site-header .header-nav { display: none; }
    }
    @media (max-width: 480px) {
      .site-header .bb-container { height: 64px; }
      .site-header .header-logo { gap: 0.45rem; }
      .site-header .header-logo-icon { width: 22px; height: 22px; }
      .site-header .header-logo-text { font-size: var(--ds-text-base); letter-spacing: 0.04em; }
      .site-header .header-cta { padding: 0.45rem 1rem; font-size: var(--ds-text-xs); letter-spacing: 0.04em; }
    }
  </style>
  <script>
    /* @section Header */
    onReady(function () {
      var header = document.querySelector('.site-header');
      if (!header) return;
      function updateHeader() {
        if (window.scrollY > 60) {
          header.classList.add('scrolled');
        } else {
          header.classList.remove('scrolled');
        }
      }
      window.addEventListener('scroll', updateHeader, { passive: true });
      updateHeader();
    });
  </script>
</head>
<body>

  <header id="site-header" class="site-header" data-label="Header">
    <div class="bb-container">
      <a class="header-logo" href="#" data-field-href="logo_url">
        <svg class="header-logo-icon" data-field="logo_icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="2" x2="12" y2="22" />
          <polyline points="12,5 6,11 12,11" />
          <polyline points="12,10 18,16 12,16" />
          <line x1="9" y1="22" x2="15" y2="22" />
        </svg>
        <span class="header-logo-text" data-field="logo_text">The Timberline</span>
      </a>
      <nav class="header-nav" data-repeater="nav_links">
        <a class="header-nav-link" href="#rooms" data-repeater-item data-field="label" data-field-href="url">Rooms</a>
        <a class="header-nav-link" href="#shuttle" data-repeater-item data-field="label" data-field-href="url">Shuttle</a>
        <a class="header-nav-link" href="#amenities" data-repeater-item data-field="label" data-field-href="url">Amenities</a>
        <a class="header-nav-link" href="#book-now" data-repeater-item data-field="label" data-field-href="url">About</a>
      </nav>
      <a class="header-cta" href="#book-now" data-field="header_cta_text" data-field-href="header_cta_url">Reserve</a>
    </div>
  </header>

</body>
</html>
